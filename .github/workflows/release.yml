name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag, for example v0.1.0"
        required: true
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    env:
      RELEASE_VERSION: ${{ inputs.version || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Package
        run: ./scripts/package-release.sh "${RELEASE_VERSION}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${RELEASE_VERSION}" dist/*.zip --generate-notes --title "${RELEASE_VERSION}"
